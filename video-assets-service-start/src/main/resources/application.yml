# ==================== 缓存开关 ====================
# true: 启用 Redis 缓存（需要 Redis 服务）
# false: 禁用缓存，直接查询数据库（无需安装 Redis）
cache:
  enabled: true

server:
  port: 8080

spring:
  application:
    name: video-assets-service
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
  datasource:
    url: jdbc:postgresql://localhost:5432/as
    username: evan
    password: evan
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
